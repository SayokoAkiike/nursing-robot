services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: precare
      POSTGRES_PASSWORD: precare
      POSTGRES_DB: precare
    ports:
      - "5432:5432"
    volumes:
      - precare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U precare"]
      interval: 5s
      timeout: 5s
      retries: 5
 
volumes:
  precare_pgdata:
 
