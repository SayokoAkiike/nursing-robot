name: pytest

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy backend perception vision
      - name: Run tests with coverage
        run: pytest tests/ -v --cov=backend --cov=perception --cov=vision --cov-report=term-missing
        env:
          NURSE_TOKEN: precare-dev-token-2026
