services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: precare
      POSTGRES_PASSWORD: precare
      POSTGRES_DB: precare
    ports:
      - "5432:5432"
    volumes:
      - precare_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U precare"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://precare:precare@db:5432/precare
      NURSE_TOKEN: ${NURSE_TOKEN:-precare-dev-token-2026}
      ALLOWED_ORIGINS: http://localhost:8501,http://localhost:8502
    depends_on:
      db:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      db:
        condition: service_healthy

volumes:
  precare_pgdata:
